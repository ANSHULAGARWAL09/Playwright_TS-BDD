name: Playwright_TS_BDD Web Tests

run-name: "Playwright_TS_BDD ${{ inputs.test_suite || 'smoke' }} tests on ${{ inputs.test_environment || 'QA' }} by @${{ github.actor }}"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 12 * * 1-5'
  pull_request_target:
    types: [ "opened", "reopened", "edited", "synchronize" ]
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      test_environment:
        type: choice
        required: true
        description: Select which environment you want to test
        options:
          - qa
          - uat
          - develop
        default: "qa"
      test_suite:
        type: choice
        required: true
        description: 'Select which Suite you want to run (NOTE: regression only available for QA)'
        options:
          - smoke
          - regression
          - debug
        default: "smoke"
      tests:
        type: string
        description: Select which tests you want to run (e.g. feature name or tag)
      test_config_files:
        type: choice
        required: true
        description: Select which browser you want tests to run on
        options:
          - chromium
          - firefox
          - webkit
        default: "chromium"

concurrency:
  group: "Playwright_TS_BDD-web-tests-${{ inputs.test_environment || 'qa' }}-${{ github.run_id }}"
  cancel-in-progress: false

jobs:
  run-qa-tests:
    name: "[smoke] QA Environment"
    if: (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.test_environment == 'qa')) && github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run tests
        run: |
          export BASE_URL=${{ secrets.QA_BASE_URL || 'https://practicetestautomation.com/practice-test-login/' }}
          if [ "${{ inputs.test_suite }}" == "smoke" ]; then
            npm run test:smoke
          elif [ "${{ inputs.test_suite }}" == "regression" ]; then
            npm run test:regression
          else
            npm test
          fi
        env:
          CI: true
      - name: Generate report
        run: npm run cucumber-report
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-qa-${{ inputs.test_suite || 'smoke' }}
          path: |
            reports/
            playwright-report/
            allure-report/

  run-uat-tests:
    name: "[${{ inputs.test_suite || 'smoke' }}] UAT Environment"
    if: (github.event_name == 'workflow_dispatch' && inputs.test_environment == 'uat') && github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run tests
        run: |
          export BASE_URL=${{ secrets.UAT_BASE_URL || 'https://practicetestautomation.com/practice-test-login/' }}
          if [ "${{ inputs.test_suite }}" == "smoke" ]; then
            npm run test:smoke
          elif [ "${{ inputs.test_suite }}" == "regression" ]; then
            npm run test:regression
          else
            npm test
          fi
        env:
          CI: true
      - name: Generate report
        run: npm run cucumber-report
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-uat-${{ inputs.test_suite || 'smoke' }}
          path: |
            reports/
            playwright-report/
            allure-report/

  run-develop-tests:
    name: "[smoke] Develop Environment"
    if: (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.test_environment == 'develop')) && github.actor != 'dependabot[bot]' && github.actor != 'dependabot-preview[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run tests
        run: |
          export BASE_URL=${{ secrets.DEVELOP_BASE_URL || 'https://practicetestautomation.com/practice-test-login/' }}
          npm run test:smoke
        env:
          CI: true
      - name: Generate report
        run: npm run cucumber-report
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-develop-smoke
          path: |
            reports/
            playwright-report/
            allure-report/